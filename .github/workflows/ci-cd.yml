name: CI/CD Pipeline - TenderScope AI Backend

on:
  push:
    branches:
      - main
      - master
      - 'feature/Devops'
  pull_request:
    branches:
      - main
      - master
      - 'feature/Devops'

jobs:
  validate-and-evaluate:
    name: Code Quality, Tests & RAG Evaluation
    runs-on: ubuntu-latest

    # Configuration des variables d'environnement globales pour le job
    env:
      # Récupération sécurisée de la clé API pour l'évaluation RAG (RAGAS / OpenAI)
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      # Definition du PYTHONPATH pour garantir que les imports de modules locaux dans backend/ fonctionnent correctement depuis Action
      PYTHONPATH: ${{ github.workspace }}/backend

    steps:
      # 1. Récupération du code source
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Configuration de l'environnement Python
      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Utilisation du cache pour accélérer l'installation des dépendances
          cache-dependency-path: 'backend/requirements.txt'

      # 3. Installation des dépendances du projet
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Installation des exigences du backend
          pip install -r backend/requirements.txt
          # Installation des outils de code quality et tests s'ils ne sont pas déjà inclus dans requirements.txt
          pip install flake8 pytest black

      # 4. Vérification de la qualité du code (Linting)
      - name: Lint with Flake8
        run: |
          cd backend
          # Arrêt du build s'il y a des erreurs de syntaxe fatales
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Avertissement pour les autres problèmes de style (ne bloque pas le pipeline de ce job)
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      # Optionnel: Formatage strict via Black (vérification seulement, pour garantir l'uniformité)
      - name: Check code formatting with Black
        run: |
          cd backend
          black --check .

      # 5. Exécution des tests unitaires
      - name: Run Unit Tests
        run: |
          cd backend
          # Lancement des tests (pytest utilisera automatiquement SQLite local en in-memory par défaut s'il est configuré pour)
          pytest

      # 6. Evaluation spécifique du pipeline RAG (Validation MLOps)
      # Garantit que le système répond toujours aux critères de pertinence avec le "Gold Dataset"
      - name: Run RAGAS Evaluation
        run: |
          cd backend
          # Script qui calcule Faithfulness, Answer Relevancy, etc., et écrit dans backend/evaluation/rag_metrics_results.csv
          python evaluation/rag_eval.py
